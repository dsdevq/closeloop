name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Every job runs on the closeloop self-hosted runner registered on
  # lifekit-vps — GitHub-hosted runners are billing-locked account-wide
  # (same constraint as devclaw + lifekit-stack).
  test:
    name: Tests
    runs-on: self-hosted
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      # The runner user (lifekit) has no sudo, so Chromium's missing host
      # libraries can't be apt-installed system-wide. Same no-root approach
      # as scripts/verify.sh's libXfixes fallback, generalized: download the
      # .debs and extract their shared objects into ~/lib, which
      # playwright.config.ts already prepends to LD_LIBRARY_PATH.
      # Idempotent — the marker file skips this on subsequent runs (the
      # runner is persistent).
      - name: Chromium host libs (no-root)
        run: |
          MARKER="$HOME/lib/.chromium-deps-v2"
          if [ ! -f "$MARKER" ]; then
            mkdir -p "$HOME/lib"
            tmp=$(mktemp -d) && cd "$tmp"
            for pkg in libnspr4 libnss3 libdbus-1-3 libatk1.0-0 libatk1.0-0t64 \
                       libatk-bridge2.0-0 libatk-bridge2.0-0t64 libcups2 libcups2t64 \
                       libatspi2.0-0 libatspi2.0-0t64 libxcomposite1 libxdamage1 \
                       libxfixes3 libxrandr2 libgbm1 libxkbcommon0 libasound2 \
                       libasound2t64 libpango-1.0-0 libcairo2 libwayland-client0 \
                       libx11-6 libx11-xcb1 libxcb1 libxext6 libxrender1 libxi6 \
                       libxtst6 libxcursor1 libxss1 libdrm2 libexpat1 \
                       libglib2.0-0 libglib2.0-0t64 libfontconfig1 libfreetype6 \
                       libharfbuzz0b libpangocairo-1.0-0 libpangoft2-1.0-0 \
                       libpixman-1-0 libpng16-16 libpng16-16t64 libjpeg62-turbo \
                       libwayland-egl1 libwayland-server0 libepoxy0 libgraphite2-3; do
              apt-get download "$pkg" 2>/dev/null || echo "skip: $pkg"
            done
            mkdir -p x
            for deb in *.deb; do [ -e "$deb" ] && dpkg-deb -x "$deb" x; done
            find x -name '*.so*' -exec cp -n {} "$HOME/lib/" \;
            touch "$MARKER"
          fi
          # Self-check: report anything the headless shell still can't resolve,
          # so a failure names the missing package instead of a launch timeout.
          SHELL_BIN=$(find "$HOME/.cache/ms-playwright" -name headless_shell -type f 2>/dev/null | head -1)
          if [ -n "$SHELL_BIN" ]; then
            LD_LIBRARY_PATH="$HOME/lib" ldd "$SHELL_BIN" | grep "not found" || echo "all shared libs resolved"
          fi

      - name: Python tests
        run: |
          python3 -m venv "$RUNNER_TEMP/venv"
          "$RUNNER_TEMP/venv/bin/pip" install --quiet --upgrade pip
          "$RUNNER_TEMP/venv/bin/pip" install --quiet -r requirements.txt
          # venv on PATH: the Playwright e2e wrapper's webServer spawns a bare
          # `uvicorn`, which must resolve to the venv's binary (exit 127 otherwise).
          export PATH="$RUNNER_TEMP/venv/bin:$PATH"
          # Host-requirement validation would refuse to launch Chromium because
          # the libs live in ~/lib, not system paths (see step above).
          export PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS=1
          python -m pytest -q

      - name: Frontend typecheck
        run: |
          cd frontend
          npm ci --silent
          npm run typecheck

      - name: Frontend lint
        run: |
          cd frontend
          npm run lint

  deploy:
    name: Deploy to lifekit-vps
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    concurrency:
      group: deploy-closeloop
      cancel-in-progress: false
    # Job-level env so every step reads the same port value.
    # APP_PORT is a repo Actions variable (not a secret) set to 8372 on lifekit-vps.
    env:
      APP_PORT: ${{ vars.APP_PORT }}
    steps:
      - uses: actions/checkout@v4

      # Snapshot the image SHA the running container was started from.
      # Used by the rollback step; empty string on first deploy (no container yet).
      - name: Record running image
        id: prev
        run: |
          PREV=$(docker inspect closeloop --format '{{.Image}}' 2>/dev/null || echo "")
          echo "image=${PREV}" >> "$GITHUB_OUTPUT"

      # Build BEFORE stopping the old container — keeps the gap between
      # rm and run to milliseconds.  --cache-from :latest reuses layers
      # even after a manual `docker system prune` wipes the build cache.
      - name: Build image
        run: |
          docker build \
            --cache-from closeloop:latest \
            -t closeloop:${{ github.sha }} \
            -t closeloop:latest \
            .

      - name: Swap singleton container
        run: |
          PORT=${APP_PORT:-8000}
          docker rm -f closeloop || true
          docker run -d --name closeloop --restart unless-stopped \
            -p "127.0.0.1:${PORT}:${PORT}" \
            -e "PORT=${PORT}" \
            -v closeloop-data:/data \
            closeloop:${{ github.sha }}

      - name: Verify healthy
        run: |
          PORT=${APP_PORT:-8000}
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${PORT}/health" > /dev/null; then
              echo "closeloop is healthy on port ${PORT}"
              exit 0
            fi
            sleep 2
          done
          echo "closeloop did not come up on port ${PORT} within 60 s"
          docker logs --tail 100 closeloop || true
          exit 1

      # If the new container failed its health check, restore the image that was
      # running before this deploy so the service keeps serving while we investigate.
      # Re-pins :latest to what is actually running so the tag stays accurate.
      - name: Rollback on failure
        if: failure() && steps.prev.outputs.image != ''
        run: |
          PORT=${APP_PORT:-8000}
          PREV="${{ steps.prev.outputs.image }}"
          echo "Rollback: restoring ${PREV}"
          docker rm -f closeloop || true
          docker run -d --name closeloop --restart unless-stopped \
            -p "127.0.0.1:${PORT}:${PORT}" \
            -e "PORT=${PORT}" \
            -v closeloop-data:/data \
            "${PREV}"
          docker tag "${PREV}" closeloop:latest || true

      # Remove layers that are no longer referenced by any tag.
      # Runs regardless of outcome — keeps disk usage in check on the runner.
      - name: Prune dangling images
        if: always()
        run: docker image prune -f
