name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Every job runs on the closeloop self-hosted runner registered on
  # lifekit-vps — GitHub-hosted runners are billing-locked account-wide
  # (same constraint as devclaw + lifekit-stack).
  test:
    name: Tests
    runs-on: self-hosted
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Python unit tests
        run: |
          python3 -m venv "$RUNNER_TEMP/venv"
          "$RUNNER_TEMP/venv/bin/pip" install --quiet --upgrade pip
          "$RUNNER_TEMP/venv/bin/pip" install --quiet -r requirements.txt
          # The Playwright wrapper runs in the containerized e2e step below —
          # the runner host cannot support a working Chromium without root
          # (user-space lib extraction lets the browser start but silently
          # breaks its input pipeline: fill/type produce empty fields).
          "$RUNNER_TEMP/venv/bin/python" -m pytest -q --ignore=tests/test_e2e_playwright.py

      # Full browser e2e inside the official Playwright image: correct
      # system deps without root on the host. Keep the image tag in sync
      # with the @playwright/test version in package-lock.json.
      - name: Playwright e2e (container)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" -w /work \
            -e HOST_UID="$(id -u)" -e HOST_GID="$(id -g)" \
            mcr.microsoft.com/playwright:v1.61.1-noble \
            bash -c "trap 'chown -R \$HOST_UID:\$HOST_GID /work' EXIT \
              && apt-get update -qq >/dev/null && apt-get install -y -qq python3-venv >/dev/null \
              && python3 -m venv /tmp/venv && /tmp/venv/bin/pip install -q -r requirements.txt \
              && export PATH=/tmp/venv/bin:\$PATH \
              && npm ci --silent \
              && npx playwright test --reporter=list"

      # Playwright saves a screenshot + ARIA snapshot per failed test into
      # test-results/. Surfacing them is the only way to see what the page
      # actually looked like on the runner.
      - name: Upload e2e failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Frontend typecheck
        run: |
          cd frontend
          npm ci --silent
          npm run typecheck

      - name: Frontend lint
        run: |
          cd frontend
          npm run lint

  deploy:
    name: Deploy to lifekit-vps
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    concurrency:
      group: deploy-closeloop
      cancel-in-progress: false
    # Job-level env so every step reads the same port value.
    # APP_PORT is a repo Actions variable (not a secret) set to 8372 on lifekit-vps.
    env:
      APP_PORT: ${{ vars.APP_PORT }}
    steps:
      - uses: actions/checkout@v4

      # Snapshot the image SHA the running container was started from.
      # Used by the rollback step; empty string on first deploy (no container yet).
      - name: Record running image
        id: prev
        run: |
          PREV=$(docker inspect closeloop --format '{{.Image}}' 2>/dev/null || echo "")
          echo "image=${PREV}" >> "$GITHUB_OUTPUT"

      # Build BEFORE stopping the old container — keeps the gap between
      # rm and run to milliseconds.  --cache-from :latest reuses layers
      # even after a manual `docker system prune` wipes the build cache.
      - name: Build image
        run: |
          docker build \
            --cache-from closeloop:latest \
            -t closeloop:${{ github.sha }} \
            -t closeloop:latest \
            .

      - name: Swap singleton container
        run: |
          PORT=${APP_PORT:-8000}
          docker rm -f closeloop || true
          docker run -d --name closeloop --restart unless-stopped \
            -p "127.0.0.1:${PORT}:${PORT}" \
            -e "PORT=${PORT}" \
            -v closeloop-data:/data \
            closeloop:${{ github.sha }}

      - name: Verify healthy
        run: |
          PORT=${APP_PORT:-8000}
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${PORT}/health" > /dev/null; then
              echo "closeloop is healthy on port ${PORT}"
              exit 0
            fi
            sleep 2
          done
          echo "closeloop did not come up on port ${PORT} within 60 s"
          docker logs --tail 100 closeloop || true
          exit 1

      # If the new container failed its health check, restore the image that was
      # running before this deploy so the service keeps serving while we investigate.
      # Re-pins :latest to what is actually running so the tag stays accurate.
      - name: Rollback on failure
        if: failure() && steps.prev.outputs.image != ''
        run: |
          PORT=${APP_PORT:-8000}
          PREV="${{ steps.prev.outputs.image }}"
          echo "Rollback: restoring ${PREV}"
          docker rm -f closeloop || true
          docker run -d --name closeloop --restart unless-stopped \
            -p "127.0.0.1:${PORT}:${PORT}" \
            -e "PORT=${PORT}" \
            -v closeloop-data:/data \
            "${PREV}"
          docker tag "${PREV}" closeloop:latest || true

      # Remove layers that are no longer referenced by any tag.
      # Runs regardless of outcome — keeps disk usage in check on the runner.
      - name: Prune dangling images
        if: always()
        run: docker image prune -f
